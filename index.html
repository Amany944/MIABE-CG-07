<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FoncierChain</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold text-center mb-8">FoncierChain 🏡</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- 👨‍💼 AGENT -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Interface Agent</h2>

      <input id="terrainId" type="text" placeholder="ID du terrain"
        class="w-full mb-2 p-2 border rounded">

      <input id="owner" type="text" placeholder="Nom du propriétaire"
        class="w-full mb-2 p-2 border rounded">

      <button onclick="ajouterTerrain()"
        class="bg-green-500 text-white px-4 py-2 rounded w-full mb-4">
        Ajouter Terrain
      </button>

      <input id="transferId" type="text" placeholder="ID du terrain"
        class="w-full mb-2 p-2 border rounded">

      <input id="newOwner" type="text" placeholder="Nouveau propriétaire"
        class="w-full mb-2 p-2 border rounded">

      <button onclick="transfererTerrain()"
        class="bg-blue-500 text-white px-4 py-2 rounded w-full">
        Transférer
      </button>
    </div>

    <!-- 🌍 PUBLIC -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Vérification publique</h2>

      <input id="searchId" type="text" placeholder="Rechercher ID terrain"
        class="w-full mb-2 p-2 border rounded">

      <button onclick="chercherTerrain()"
        class="bg-purple-500 text-white px-4 py-2 rounded w-full mb-4">
        Rechercher
      </button>

      <div id="result" class="p-4 bg-gray-100 rounded">
        Résultat ici...
      </div>
    </div>

  </div>

  <script>
    let terrains = {};

    function ajouterTerrain() {
      let id = document.getElementById("terrainId").value;
      let owner = document.getElementById("owner").value;

      if (terrains[id]) {
        alert("❌ Terrain déjà enregistré !");
        return;
      }

      terrains[id] = {
        owner: owner,
        history: [owner]
      };

      alert("✅ Terrain ajouté !");
    }

    function transfererTerrain() {
      let id = document.getElementById("transferId").value;
      let newOwner = document.getElementById("newOwner").value;

      if (!terrains[id]) {
        alert("❌ Terrain inexistant !");
        return;
      }

      terrains[id].owner = newOwner;
      terrains[id].history.push(newOwner);

      alert("🔁 Transfert réussi !");
    }

    function chercherTerrain() {
      let id = document.getElementById("searchId").value;
      let resultDiv = document.getElementById("result");

      if (!terrains[id]) {
        resultDiv.innerHTML = "❌ Terrain non trouvé";
        return;
      }

      let data = terrains[id];

      resultDiv.innerHTML = `
        <p><strong>Propriétaire :</strong> ${data.owner}</p>
        <p><strong>Historique :</strong> ${data.history.join(" → ")}</p>
      `;
    }
  </script>

</body>
</html>
